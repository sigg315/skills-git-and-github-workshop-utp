name: Paso 0 - Iniciar Ejercicio

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write
  issues: write
  administration: write

env:
  STEP_1_FILE: ".github/steps/1-step.md"

jobs:
  enable_issues:
    name: Habilitar Issues
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.is_template }}
    steps:
      - name: Activar Issues en el repositorio
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              has_issues: true
            });

  start_exercise:
    if: ${{ !github.event.repository.is_template }}
    needs: [enable_issues]
    name: Iniciar Ejercicio
    uses: skills/exercise-toolkit/.github/workflows/start-exercise.yml@v0.8.1
    with:
      exercise-title: "Taller de Git y GitHub — UTP Panamá"
      intro-message: "¡Bienvenido/a al taller! Aprenderás el flujo real de colaboración con Git y GitHub — fork → clone → branch → commit → push → Pull Request. ¡Tu tarjeta de perfil aparecerá en el sitio del taller! 🚀"

  post_next_step_content:
    name: Publicar instrucciones del Paso 1
    runs-on: ubuntu-latest
    needs: [start_exercise]
    env:
      ISSUE_NUMBER: ${{ needs.start_exercise.outputs.issue-number }}
      ISSUE_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Obtener plantillas de respuesta
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.8.1

      - name: Publicar comentario - contenido del Paso 1
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_1_FILE }}
          vars: |
            login: ${{ github.actor }}
            full_repo_name: ${{ github.repository }}

      - name: Publicar comentario - esperando progreso
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: Activar workflow del Paso 1
        run: gh workflow enable "Paso 1 - Validar Rama"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
